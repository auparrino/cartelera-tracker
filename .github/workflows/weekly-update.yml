name: Weekly data update

on:
  schedule:
    # Lunes 14:00 ART = 17:00 UTC (Argentina no observa horario de verano)
    - cron: "0 17 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/build_aggregates.py

      - name: Commit refreshed data
        run: |
          git config user.name "cartelera-bot"
          git config user.email "cartelera-bot@users.noreply.github.com"
          git add public/data data/snapshots data/raw 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
